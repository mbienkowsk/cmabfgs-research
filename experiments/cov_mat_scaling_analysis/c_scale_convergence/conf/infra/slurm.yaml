# @package _global_

defaults:
  - override /hydra/launcher: submitit_slurm
  - _self_

hydra:
  launcher:
    submitit_folder: ${hydra.sweep.dir}/.submitit/%j
    cpus_per_task: 25
    gpus_per_node: null
    tasks_per_node: 1
    mem_gb: 1
    nodes: 1
    name: ${hydra.job.name}
    qos: plgrid1
    _target_: hydra_plugins.hydra_submitit_launcher.submitit_launcher.SlurmLauncher
    account: plgcmaes
    partition: plgrid
    additional_parameters:
      time: "72:00:00"
    array_parallelism: 20
